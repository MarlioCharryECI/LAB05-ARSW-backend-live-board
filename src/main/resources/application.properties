spring.application.name=Live-Board
server.port=8080

# Configuracion del modo de comunicacionn del tablero
# Opciones: rest o websocket
# Para cambiar a WebSockets, cambia esta linea a: board.communication.mode=websocket
board.communication.mode=websocket

# Configuracion de logging
logging.level.arsw.java.Live_Board=INFO
logging.level.org.springframework.web.socket=WARN

# Configuracion de Jackson
spring.jackson.serialization.indent-output=true
